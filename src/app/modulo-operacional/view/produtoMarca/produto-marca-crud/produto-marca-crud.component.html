<div class="ui-g"> 

  <!----------------------------------------TABELA---------------------------------------->
  
  
    <div class="ui-g-12">
        <div class="card">
            <h1>Produtos/Marcas</h1>        
            <p>
                      <p-table #dt [columns]="cols" [value]="produtoMarcas" selectionMode="single" [(selection)]="selectedProdutoMarca" (onRowSelect)="onRowSelect($event)" [paginator]="true" [rows]="15">
                          <ng-template pTemplate="caption">
                            
                              <div style="text-align: right">        
                                  <i class="fa fa-search" style="margin:4px 4px 0 0"></i>
                                  <input type="text" pInputText size="50" placeholder="Pesquisa" (input)="dt.filterGlobal($event.target.value, 'contains')" style="width:auto">
                              </div>
                          </ng-template>
                          <ng-template pTemplate="header" let-columns>
                              <tr>
                                  <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                                      {{col.header}}
                                      <p-sortIcon [field]="col.field"></p-sortIcon>
                                  </th>
                              </tr>
                          </ng-template>
                          <ng-template pTemplate="body" let-rowData let-columns="columns">
                              <tr [pSelectableRow]="rowData">
                                  <td *ngFor="let col of columns">
                                      {{rowData[col.field]}}
                                  </td>
                              </tr>
                          </ng-template>
                          <ng-template pTemplate="summary" let-rowData>
                              <div style="text-align:left">
                                  <button type="button" pButton icon="fa fa-plus" (click)="showDialogToAdd()" label="Novo"></button>
                              </div>
                          </ng-template>    
                      </p-table>
              
                      <p-dialog header="Marcas de produtos" [(visible)]="displayDialog" [responsive]="true" showEffect="fade" [modal]="true" >
                          <div class="ui-g ui-fluid" *ngIf="produtoMarca">
                         
                              <div class="ui-g-12">                               
                                  <div class="ui-g-5"  >
                                      <label for="nome">Nome</label>
                                      <input appAutofocus pInputText id="nome" [(ngModel)]="produtoMarca.nome"   />
                                  </div>                           
                           
                                 
                                  <div class="ui-g-7">
                                      <label  for="descricao">Descrição</label>
                                      <input pInputText id="descricao" [(ngModel)]="produtoMarca.descricao"/>
                                  </div>
                              </div>
                        
                          </div>
                          <p-footer>
                              <div class="ui-dialog-buttonpane ui-helper-clearfix">
                                  <button type="button" pButton icon="fa fa-close" (click)="delete()" label="Excluir"></button>
                                  <button type="button" pButton icon="fa fa-check" (click)="save()" label="Salvar"></button>
                              </div>
                          </p-footer>
                      </p-dialog>   
            </p>
        </div>
    </div>
  </div>
